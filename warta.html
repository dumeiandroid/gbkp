<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warta Jemaat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm: #f5efe4;
    --gold: #c9973a;
    --gold-light: #e8c06d;
    --brown: #5c3d1e;
    --brown-dark: #3a2510;
    --text: #2c1f0e;
    --muted: #8a7260;
    --border: #e0d4c0;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Top ornament ── */
  .top-bar {
    height: 5px;
    background: linear-gradient(90deg, var(--brown-dark), var(--gold), var(--gold-light), var(--gold), var(--brown-dark));
  }

  /* ── Header ── */
  header {
    background: var(--brown-dark);
    padding: 40px 20px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .home-btn {
    position: absolute;
    top: 14px;
    left: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: transparent;
    color: var(--gold-light);
    border: 1.5px solid var(--gold);
    border-radius: 4px;
    font-family: 'Lato', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    z-index: 10;
  }
  .home-btn:hover { background: rgba(201,151,58,0.15); color: var(--white); }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(201,151,58,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(201,151,58,0.15) 0%, transparent 60%);
  }
  .cross-ornament {
    color: var(--gold);
    font-size: 1.6rem;
    letter-spacing: 0.3em;
    display: block;
    margin-bottom: 10px;
    opacity: 0.7;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--cream);
    letter-spacing: 0.05em;
    line-height: 1.2;
    position: relative;
  }
  header h1 em {
    color: var(--gold-light);
    font-style: normal;
  }
  .church-name {
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
  }

  /* ── Nav ── */
  nav {
    background: var(--warm);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    justify-content: center;
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  nav a {
    padding: 14px 20px;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    cursor: pointer;
  }
  nav a:hover, nav a.active {
    color: var(--brown);
    border-bottom-color: var(--gold);
  }

  /* ── Main layout ── */
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── Date header ── */
  .date-section {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeIn 0.6s ease both;
  }
  .date-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .date-value {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: var(--brown);
  }
  .date-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px auto;
    max-width: 300px;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .date-divider::after {
    background: linear-gradient(to left, transparent, var(--gold));
  }
  .date-divider span { color: var(--gold); font-size: 1rem; }

  /* ── Action buttons ── */
  .action-buttons {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .btn {
    padding: 10px 24px;
    border-radius: 3px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Lato', sans-serif;
  }
  .btn-primary {
    background: var(--brown);
    color: var(--cream);
    box-shadow: 0 2px 8px rgba(58,37,16,0.3);
  }
  .btn-primary:hover { background: var(--brown-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(58,37,16,0.4); }
  .btn-outline {
    background: transparent;
    color: var(--brown);
    border: 1.5px solid var(--gold);
  }
  .btn-outline:hover { background: var(--warm); }

  /* ── Warta images ── */
  .warta-images {
    animation: fadeIn 0.5s ease both 0.2s;
  }
  .warta-images img {
    display: block;
    width: 100%;
    max-width: 680px;
    margin: 0 auto 16px;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    border: 1px solid var(--border);
  }

  /* ── Arsip section ── */
  /* arsipSection visibility controlled by JS */

  /* ── Section title ── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--brown);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Table card ── */
  .table-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    background: var(--warm);
  }
  .table-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--brown);
  }
  .search-box {
    padding: 8px 14px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    font-size: 0.82rem;
    color: var(--text);
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
    font-family: 'Lato', sans-serif;
  }
  .search-box:focus { border-color: var(--gold); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead { background: var(--warm); }
  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdfaf6; }
  .td-no { font-size: 0.75rem; color: var(--muted); font-weight: 700; width: 48px; }
  .td-date {
    font-family: 'Playfair Display', serif;
    color: var(--brown);
    font-size: 0.92rem;
  }
  .td-actions { white-space: nowrap; width: 90px; }
  .btn-view-sm {
    background: #ebf8ff;
    color: #2b6cb0;
    border: 1px solid #90cdf4;
    padding: 5px 14px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Lato', sans-serif;
  }
  .btn-view-sm:hover { background: #bee3f8; }
  .empty-row { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 0.85rem; }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--warm);
    flex-wrap: wrap;
    gap: 10px;
  }
  .pagination-info {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .pagination-btns {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .page-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--brown);
    font-size: 0.78rem;
    font-weight: 700;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Lato', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .page-btn:hover:not(:disabled) { background: var(--warm); border-color: var(--gold); }
  .page-btn.active { background: var(--brown); color: var(--cream); border-color: var(--brown); }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-ellipsis { font-size: 0.78rem; color: var(--muted); padding: 0 2px; }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .loading-cross {
    font-size: 2rem;
    animation: spinCross 2s linear infinite;
    display: block;
    margin-bottom: 16px;
    color: var(--gold);
  }
  @keyframes spinCross {
    0%   { transform: rotate(0deg);   opacity: 1; }
    50%  { transform: rotate(180deg); opacity: 0.4; }
    100% { transform: rotate(360deg); opacity: 1; }
  }

  /* ── Error ── */
  .error-box {
    background: #fff5f5;
    border: 1px solid #ffd0d0;
    border-left: 4px solid #e53e3e;
    padding: 16px 20px;
    border-radius: 4px;
    color: #742a2a;
    font-size: 0.85rem;
    margin: 20px 0;
  }

  /* ── Footer ── */
  footer {
    background: var(--brown-dark);
    color: var(--muted);
    text-align: center;
    padding: 20px;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    margin-top: 40px;
  }
  footer span { color: var(--gold); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .search-box { width: 140px; }
    .pagination { justify-content: center; }
  }
</style>
</head>
<body>

<div class="top-bar"></div>

<header>
  <a href="index.html" class="home-btn">🏠 Home</a>
  <span class="cross-ornament">✦ ✝ ✦</span>
  <h1>Warta <em>Jemaat</em></h1>
  <p class="church-name">Gereja Batak Karo Protestan</p>
</header>

<nav>
  <a class="active" id="navWarta" onclick="showView('warta')">📖 Warta Minggu</a>
  <a id="navArsip" onclick="showView('arsip')">🗂 Arsip Warta</a>
</nav>

<div class="container">

  <!-- ── WARTA TERBARU ── -->
  <div id="wartaSection">
    <div class="loading" id="loadingWarta">
      <span class="loading-cross">✝</span>
      Mengambil warta terbaru...
    </div>
    <div id="wartaContent" style="display:none;">
      <div class="date-section">
        <div class="date-label">Warta Minggu</div>
        <div class="date-value" id="wartaTanggal">—</div>
        <div class="date-divider"><span>✦</span></div>
      </div>
      <div class="action-buttons">
        <a id="btnDownload" href="#" target="_blank" class="btn btn-primary">
          ⬇ Download PDF
        </a>
        <button class="btn btn-outline" onclick="showView('arsip')">
          ◀ Minggu Sebelumnya
        </button>
      </div>
      <div class="warta-images" id="wartaImages"></div>
    </div>
    <div class="error-box" id="wartaError" style="display:none;"></div>
  </div>

  <!-- ── ARSIP ── -->
  <div id="arsipSection" style="display:none;">
    <div class="section-title">Arsip Warta Jemaat</div>

    <div class="loading" id="loadingArsip">
      <span class="loading-cross">✝</span>
      Memuat arsip...
    </div>

    <div id="arsipTableWrap" style="display:none;">
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Daftar Warta &nbsp;<span style="font-size:0.75rem;font-family:'Lato';color:var(--muted);" id="arsipCount"></span></div>
          <input type="text" class="search-box" placeholder="🔍 Cari tanggal..." id="arsipSearch" oninput="filterArsip()">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:48px;">No</th>
                <th>Tanggal</th>
                <th style="width:90px; text-align:center;">Lihat</th>
              </tr>
            </thead>
            <tbody id="arsipTableBody">
              <tr><td colspan="3" class="empty-row">—</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="arsipPagination" style="display:none;">
          <div class="pagination-info" id="arsipPagInfo"></div>
          <div class="pagination-btns" id="arsipPagBtns"></div>
        </div>
      </div>
    </div>

    <div class="error-box" id="arsipError" style="display:none;"></div>
  </div>

</div>

<footer>
  &copy; 2024 &nbsp;<span>GBKP</span> &nbsp;·&nbsp; Warta Jemaat Online
</footer>

<script>
const VERSION   = 'warta.html v2.1 — 2026-03-04';
console.log('%c' + VERSION, 'background:#3a2510;color:#e8c06d;font-weight:bold;padding:4px 10px;border-radius:3px;');
console.log('asText mode: tanggal ditampilkan RAW dari database (tanpa parsing).');

const API_BASE  = 'https://lidan-co-id.pages.dev/api/db_gbkp1';
const API_KEY   = 'admin';
const TABLE     = 'warta';
const BASE_IMG  = 'https://gbkp-my-id.pages.dev/gambar/warta/';
const BASE_PDF  = 'https://gbkp-my-id.pages.dev/gambar/warta/';
const PAGE_SIZE = 20;

async function apiFetch(params) {
  const res = await fetch(`${API_BASE}?${new URLSearchParams(params)}`, {
    headers: { 'X-Custom-Auth': API_KEY }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// Tampilkan x_01 sebagai teks apa adanya, tanpa parsing tanggal
function asText(val) {
  return (val !== null && val !== undefined) ? String(val).trim() || '—' : '—';
}

function sortByIdDesc(rows) {
  return [...rows].sort((a, b) => Number(b.id_x || 0) - Number(a.id_x || 0));
}

let arsipLoaded = false;

function showView(view) {
  const isWarta = view === 'warta';
  document.getElementById('wartaSection').style.display = isWarta ? '' : 'none';
  document.getElementById('arsipSection').style.display = isWarta ? 'none' : 'block';
  document.getElementById('navWarta').classList.toggle('active', isWarta);
  document.getElementById('navArsip').classList.toggle('active', !isWarta);
  if (!isWarta) arsipLoaded ? showArsipTable() : loadArsip();
}

async function loadWartaTerbaru(id_x = null) {
  const loadEl = document.getElementById('loadingWarta');
  const contEl = document.getElementById('wartaContent');
  const errEl  = document.getElementById('wartaError');
  loadEl.style.display = '';
  contEl.style.display = 'none';
  errEl.style.display  = 'none';
  try {
    const params = { table: TABLE };
    if (id_x) params['id_x'] = id_x;
    const result = await apiFetch(params);
    const row = Array.isArray(result.data)
      ? sortByIdDesc(result.data)[0]
      : result.data;
    if (!row) throw new Error('Data warta tidak ditemukan.');
    renderWarta(row);
    loadEl.style.display = 'none';
    contEl.style.display = '';
  } catch (e) {
    loadEl.style.display = 'none';
    errEl.style.display  = '';
    errEl.textContent    = `Gagal memuat warta: ${e.message}`;
  }
}

function renderWarta(row) {
  document.getElementById('wartaTanggal').textContent = asText(row.x_01);
  const pdfLink = document.getElementById('btnDownload');
  if (row.x_03) {
    pdfLink.href = BASE_PDF + String(row.x_03).trim();
    pdfLink.style.display = '';
  } else {
    pdfLink.style.display = 'none';
  }
  const imgContainer = document.getElementById('wartaImages');
  imgContainer.innerHTML = '';
  if (row.x_02) {
    String(row.x_02).split('|').filter(s => s.trim()).forEach(src => {
      const img = document.createElement('img');
      img.src     = BASE_IMG + src.trim();
      img.alt     = 'Warta Jemaat';
      img.loading = 'lazy';
      imgContainer.appendChild(img);
    });
  }
}

let arsipAllRows     = [];
let arsipFiltered    = [];
let arsipCurrentPage = 1;

async function loadArsip() {
  const loadEl = document.getElementById('loadingArsip');
  const wrapEl = document.getElementById('arsipTableWrap');
  const errEl  = document.getElementById('arsipError');
  loadEl.style.display = '';
  wrapEl.style.display = 'none';
  errEl.style.display  = 'none';
  try {
    const result = await apiFetch({ table: TABLE });
    arsipAllRows     = sortByIdDesc(result.data || []);
    arsipFiltered    = [...arsipAllRows];
    arsipLoaded      = true;
    arsipCurrentPage = 1;
    loadEl.style.display = 'none';
    wrapEl.style.display = '';
    renderArsipTable();
  } catch (e) {
    loadEl.style.display = 'none';
    errEl.style.display  = '';
    errEl.textContent    = `Gagal memuat arsip: ${e.message}`;
  }
}

function showArsipTable() {
  document.getElementById('arsipTableWrap').style.display = '';
  document.getElementById('loadingArsip').style.display   = 'none';
  renderArsipTable();
}

function filterArsip() {
  const q = document.getElementById('arsipSearch').value.toLowerCase();
  arsipFiltered    = sortByIdDesc(arsipAllRows.filter(r => asText(r.x_01).toLowerCase().includes(q)));
  arsipCurrentPage = 1;
  renderArsipTable();
}

function renderArsipTable() {
  const tbody      = document.getElementById('arsipTableBody');
  const total      = arsipFiltered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (arsipCurrentPage > totalPages) arsipCurrentPage = totalPages;

  const start    = (arsipCurrentPage - 1) * PAGE_SIZE;
  const end      = Math.min(start + PAGE_SIZE, total);
  const pageRows = arsipFiltered.slice(start, end);

  document.getElementById('arsipCount').textContent = `(${total} data)`;

  tbody.innerHTML = '';
  if (!pageRows.length) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty-row">Belum ada data warta.</td></tr>';
  } else {
    pageRows.forEach((row, i) => {
      const tr = document.createElement('tr');
      const td1 = document.createElement('td'); td1.className = 'td-no'; td1.textContent = start + i + 1;
      const td2 = document.createElement('td'); td2.className = 'td-date'; td2.textContent = asText(row.x_01);
      const td3 = document.createElement('td'); td3.className = 'td-actions'; td3.style.textAlign = 'center';
      const btn = document.createElement('button'); btn.className = 'btn-view-sm';
      btn.textContent = '👁 Lihat';
      btn.onclick = () => openWarta(row.id_x);
      td3.appendChild(btn);
      tr.append(td1, td2, td3);
      tbody.appendChild(tr);
    });
  }

  const pagEl  = document.getElementById('arsipPagination');
  const infoEl = document.getElementById('arsipPagInfo');
  const btnsEl = document.getElementById('arsipPagBtns');

  if (total === 0) { pagEl.style.display = 'none'; return; }

  pagEl.style.display = '';
  infoEl.textContent  = `Menampilkan ${start + 1}–${end} dari ${total} data`;
  btnsEl.innerHTML    = '';

  const prev = document.createElement('button');
  prev.className = 'page-btn'; prev.textContent = '‹';
  prev.disabled = arsipCurrentPage === 1;
  prev.onclick = () => { arsipCurrentPage--; renderArsipTable(); };
  btnsEl.appendChild(prev);

  getPageRange(arsipCurrentPage, totalPages).forEach(p => {
    if (p === '…') {
      const el = document.createElement('span');
      el.className = 'page-ellipsis'; el.textContent = '…';
      btnsEl.appendChild(el);
    } else {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (p === arsipCurrentPage ? ' active' : '');
      btn.textContent = p;
      btn.onclick = () => { arsipCurrentPage = p; renderArsipTable(); };
      btnsEl.appendChild(btn);
    }
  });

  const next = document.createElement('button');
  next.className = 'page-btn'; next.textContent = '›';
  next.disabled = arsipCurrentPage === totalPages;
  next.onclick = () => { arsipCurrentPage++; renderArsipTable(); };
  btnsEl.appendChild(next);
}

function getPageRange(current, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
  if (current <= 4) return [1, 2, 3, 4, 5, '…', total];
  if (current >= total - 3) return [1, '…', total-4, total-3, total-2, total-1, total];
  return [1, '…', current-1, current, current+1, '…', total];
}

function openWarta(id) {
  loadWartaTerbaru(id);
  showView('warta');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

const urlParams = new URLSearchParams(window.location.search);
const initId    = urlParams.get('id_x');
if (urlParams.get('p') === 'arsip') {
  showView('arsip');
} else {
  loadWartaTerbaru(initId || null);
}
</script>
